services:
  web:
    image: ${PLANE_FRONTEND_IMAGE:-makeplane/plane-frontend}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    command: node web/server.js web
    restart: unless-stopped
    depends_on:
      - api
      - worker
    env_file:
      - .env

  space:
    image: ${PLANE_SPACE_IMAGE:-makeplane/plane-space}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    command: node space/server.js space
    restart: unless-stopped
    depends_on:
      - api
      - worker
      - web
    env_file:
      - .env

  admin:
    image: ${PLANE_ADMIN_IMAGE:-makeplane/plane-admin}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    command: node admin/server.js admin
    restart: unless-stopped
    depends_on:
      - api
      - web
    env_file:
      - .env

  live:
    image: ${PLANE_LIVE_IMAGE:-makeplane/plane-live}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    command: node live/dist/server.js live
    restart: unless-stopped
    depends_on:
      - api
      - web
    env_file:
      - .env

  api:
    image: ${PLANE_BACKEND_IMAGE:-makeplane/plane-backend}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    command: ./bin/docker-entrypoint-api.sh
    restart: unless-stopped
    volumes:
      - logs_api:/code/plane/logs
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  worker:
    image: ${PLANE_BACKEND_IMAGE:-makeplane/plane-backend}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    volumes:
      - logs_worker:/code/plane/logs
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  beat-worker:
    image: ${PLANE_BACKEND_IMAGE:-makeplane/plane-backend}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    volumes:
      - logs_beat-worker:/code/plane/logs
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  migrator:
    image: ${PLANE_BACKEND_IMAGE:-makeplane/plane-backend}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    command: ./bin/docker-entrypoint-migrator.sh
    restart: "no"
    volumes:
      - logs_migrator:/code/plane/logs
    depends_on:
      - plane-db
      - plane-redis
    env_file:
      - .env

  plane-db:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    command: postgres -c 'max_connections=1000'
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env

  plane-redis:
    image: ${REDIS_IMAGE:-valkey/valkey:7.2.5-alpine}
    restart: unless-stopped
    volumes:
      - redisdata:/data
    env_file:
      - .env

  plane-mq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.13.6-management-alpine}
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    env_file:
      - .env

  plane-minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: server /export --console-address ":9090"
    restart: unless-stopped
    volumes:
      - uploads:/export
    env_file:
      - .env

  proxy:
    image: ${PLANE_PROXY_IMAGE:-makeplane/plane-proxy}:${APP_RELEASE:-v0.27.1}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - web
      - api
      - space
    env_file:
      - .env

volumes:
  pgdata:
  redisdata:
  uploads:
  logs_api:
  logs_worker:
  logs_beat-worker:
  logs_migrator:
  rabbitmq_data:
