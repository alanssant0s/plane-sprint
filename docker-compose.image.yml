version: "3.8"

services:
  web:
    image: ghcr.io/alanssant0s/plane-sprint/plane-frontend:${APP_RELEASE:-main}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
      - worker
    env_file:
      - .env

  space:
    image: ghcr.io/alanssant0s/plane-sprint/plane-space:${APP_RELEASE:-main}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
      - worker
      - web
    env_file:
      - .env

  admin:
    image: ghcr.io/alanssant0s/plane-sprint/plane-admin:${APP_RELEASE:-main}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
      - web
    env_file:
      - .env

  live:
    image: ghcr.io/alanssant0s/plane-sprint/plane-live:${APP_RELEASE:-main}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
      - web
    env_file:
      - .env

  api:
    image: ghcr.io/alanssant0s/plane-sprint/plane-backend:${APP_RELEASE:-main}
    pull_policy: always
    restart: unless-stopped
    command: ./bin/docker-entrypoint-api.sh
    volumes:
      - logs_api:/code/plane/logs
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  worker:
    image: ghcr.io/alanssant0s/plane-sprint/plane-backend:${APP_RELEASE:-main}
    pull_policy: always
    restart: unless-stopped
    command: ./bin/docker-entrypoint-worker.sh
    volumes:
      - logs_worker:/code/plane/logs
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  beat-worker:
    image: ghcr.io/alanssant0s/plane-sprint/plane-backend:${APP_RELEASE:-main}
    pull_policy: always
    restart: unless-stopped
    command: ./bin/docker-entrypoint-beat.sh
    volumes:
      - logs_beat-worker:/code/plane/logs
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  migrator:
    image: ghcr.io/alanssant0s/plane-sprint/plane-backend:${APP_RELEASE:-main}
    pull_policy: always
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    volumes:
      - logs_migrator:/code/plane/logs
    depends_on:
      - plane-db
      - plane-redis
    env_file:
      - .env

  plane-db:
    image: postgres:17-alpine
    restart: unless-stopped
    command: postgres -c 'max_connections=1000'
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env

  plane-redis:
    image: valkey/valkey:7.2.5-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    env_file:
      - .env

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    env_file:
      - .env

  plane-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /export --console-address ":9090"
    volumes:
      - uploads:/export
    env_file:
      - .env

  proxy:
    image: ghcr.io/alanssant0s/plane-sprint/plane-proxy:${APP_RELEASE:-main}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - web
      - api
      - space
      - admin
      - live
      - plane-minio
    env_file:
      - .env
    environment:
      SITE_ADDRESS: ":80"
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
      BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-0.0.0.0/0}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /tmp/Caddyfile <<'EOF'
        {
          servers {
            max_header_size 25MB
            client_ip_headers X-Forwarded-For X-Real-IP
            trusted_proxies static 0.0.0.0/0
          }
        }

        (plane_proxy) {
          request_body {
            max_size 5242880
          }

          redir /spaces /spaces/ permanent
          reverse_proxy /spaces/* space:3000

          redir /god-mode /god-mode/ permanent
          reverse_proxy /god-mode/* admin:3000

          reverse_proxy /live/* live:3000
          reverse_proxy /api/* api:8000
          reverse_proxy /auth/* api:8000
          reverse_proxy /static/* api:8000

          reverse_proxy /uploads/* plane-minio:9000
          reverse_proxy /uploads plane-minio:9000

          reverse_proxy /* web:3000
        }

        :80 {
          import plane_proxy
        }
        EOF

        exec caddy run --config /tmp/Caddyfile --adapter caddyfile

volumes:
  pgdata:
  redisdata:
  uploads:
  logs_api:
  logs_worker:
  logs_beat-worker:
  logs_migrator:
  rabbitmq_data:
